<!DOCTYPE html>
<html>
<head>
    <title>SmartAccess Test</title>
</head>
<body>

<h2>SmartAccess 🔐</h2>

<video id="video" autoplay width="400"></video>

<br><br>

<button onclick="registrar()">Registrar Elkin</button>
<button onclick="reconocer()">Reconocer</button>

<p id="resultado"></p>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const resultado = document.getElementById("resultado");

// cámara
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
});

// capturar imagen
function capturar() {
    const ctx = canvas.getContext("2d");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    return canvas.toDataURL("image/png");
}

// registrar
function registrar() {
    fetch("http://127.0.0.1:5000/usuarios", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            imagen: capturar()
        })
    })
    .then(r => r.json())
    .then(d => resultado.innerText = d.mensaje);
}

// reconocer
function reconocer() {
    fetch("http://127.0.0.1:5000/reconocer", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            imagen: capturar()
        })
    })
    .then(r => r.json())
    .then(d => resultado.innerText = d.mensaje);
}
</script>

</body>
</html>
