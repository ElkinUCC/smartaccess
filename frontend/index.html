<!DOCTYPE html>
<html>
<head>
    <div class="container"></div>
    <title>SmartAccess</title>

    <style>
        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
            url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1");
            background-size: cover;
            color: white;
            text-align: center;
        }

        h2 {
            margin-top: 30px;
            font-size: 32px;
        }

        .container {
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 30px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        video {
            border-radius: 10px;
            margin-top: 10px;
            border: 3px solid #00c853;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            background: #00c853;
            color: black;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        button:hover {
            background: #00e676;
            transform: scale(1.05);
        }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            display: none;
            text-align: center;
        }

        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
        }

        .ok {
            color: #00e676;
        }

        .error {
            color: #ff5252;
        }
    </style>
</head>

<body>

<h2>SmartAccess 🔐</h2>

<div class="container">
    <video id="video" autoplay width="400"></video>

    <br>

    <input type="text" id="nombre" placeholder="Escribe tu nombre">

    <br>

    <button onclick="reconocer()">🔍 Reconocer</button>
    <button onclick="registrar()">➕ Registrar</button>

    <p id="resultado"></p>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const resultado = document.getElementById("resultado");
const inputNombre = document.getElementById("nombre");

// 🎥 activar cámara
navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => {
    video.srcObject = stream;
})
.catch(err => {
    alert("No se pudo activar la cámara");
});

// 📸 capturar imagen
function capturar() {
    const ctx = canvas.getContext("2d");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);
    return canvas.toDataURL("image/png");
}

// 🔍 reconocer
function reconocer() {
    resultado.innerText = "Procesando...";
    resultado.className = "";

    fetch("http://127.0.0.1:5000/reconocer", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            imagen: capturar()
        })
    })
    .then(res => res.json())
    .then(data => {
        resultado.innerText = data.mensaje;

        if (data.mensaje.includes("permitido")) {
            resultado.className = "ok";
            inputNombre.style.display = "none";
        } else {
            resultado.className = "error";
            inputNombre.style.display = "inline";
        }
    })
    .catch(err => {
        resultado.innerText = "Error en reconocimiento";
        resultado.className = "error";
    });
}

// ➕ registrar
function registrar() {
    const nombre = inputNombre.value;

    if (!nombre) {
        alert("Escribe tu nombre primero 😄");
        return;
    }

    resultado.innerText = "Registrando...";
    resultado.className = "";

    fetch("http://127.0.0.1:5000/usuarios", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            nombre: nombre,
            imagen: capturar()
        })
    })
    .then(res => res.json())
    .then(data => {
        resultado.innerText = data.mensaje;
        resultado.className = "ok";

        inputNombre.value = "";
        inputNombre.style.display = "none";
    })
    .catch(err => {
        resultado.innerText = "Error al registrar";
        resultado.className = "error";
    });
}
</script>
</div>

</body>
</html>
