<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SmartAccess</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
            url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1");
            background-size: cover;
            color: white;
            text-align: center;
        }

        h2 {
            margin-top: 30px;
            font-size: 32px;
        }

        .container {
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 30px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
        }

        video {
            border-radius: 10px;
            margin-top: 10px;
            border: 3px solid #00c853;
        }

        button {
            padding: 10px 20px;
            margin: 10px;
            border: none;
            background: #00c853;
            color: black;
            font-size: 16px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        button:hover {
            background: #00e676;
            transform: scale(1.05);
        }

        input {
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: none;
            display: none;
            text-align: center;
        }

        #resultado {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
            padding: 10px;
            border-radius: 8px;
        }

        .ok { color: #00e676; }
        .error { color: #ff5252; }
    </style>
</head>

<body>

<h2>SmartAccess 🔐</h2>

<div class="container">

    <!-- 🎥 Video de la cámara -->
    <video id="video" autoplay width="400"></video>

    <br>

    <!-- 🧑 Input de nombre -->
    <input type="text" id="nombre" placeholder="Escribe tu nombre">

    <br>

    <!-- 🎯 Botones -->
    <button onclick="reconocer()">🔍 Reconocer</button>
    <button onclick="registrar()">➕ Registrar</button>

    <!-- 📢 Resultado -->
    <p id="resultado"></p>

</div>

<!-- 📸 Canvas oculto para capturar imagen -->
<canvas id="canvas" style="display:none;"></canvas>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("canvas");
const resultado = document.getElementById("resultado");
const inputNombre = document.getElementById("nombre");

// 🔥 URL base (mejor práctica)
const API_URL = "http://127.0.0.1:5000";


// =========================
// 🎥 ACTIVAR CÁMARA
// =========================
async function iniciarCamara() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true });
        video.srcObject = stream;
    } catch (error) {
        alert("No se pudo activar la cámara");
        console.error(error);
    }
}

iniciarCamara();


// =========================
// 📸 CAPTURAR IMAGEN
// =========================
function capturar() {
    const ctx = canvas.getContext("2d");

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    ctx.drawImage(video, 0, 0);

    // ⚡ comprimimos imagen (más liviana)
    return canvas.toDataURL("image/jpeg", 0.7);
}


// =========================
// 🔍 RECONOCER
// =========================
async function reconocer() {
    resultado.innerText = "Procesando...";
    resultado.className = "";

    try {
        const res = await fetch(`${API_URL}/reconocer`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                imagen: capturar()
            })
        });

        const data = await res.json();

        resultado.innerText = data.mensaje;

        if (data.mensaje.includes("permitido")) {
            resultado.className = "ok";
            inputNombre.style.display = "none";
        } else {
            resultado.className = "error";
            inputNombre.style.display = "inline";
        }

    } catch (error) {
        resultado.innerText = "Error en reconocimiento";
        resultado.className = "error";
        console.error(error);
    }
}


// =========================
// ➕ REGISTRAR
// =========================
async function registrar() {
    const nombre = inputNombre.value.trim();

    if (!nombre) {
        alert("Escribe tu nombre primero 😄");
        return;
    }

    resultado.innerText = "Registrando...";
    resultado.className = "";

    try {
        const res = await fetch(`${API_URL}/usuarios`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                nombre: nombre,
                imagen: capturar()
            })
        });

        const data = await res.json();

        resultado.innerText = data.mensaje;
        resultado.className = "ok";

        inputNombre.value = "";
        inputNombre.style.display = "none";

    } catch (error) {
        resultado.innerText = "Error al registrar";
        resultado.className = "error";
        console.error(error);
    }
}
</script>

</body>
</html>
